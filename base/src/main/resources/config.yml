tweaks:
  veinminer:
    enabled: false

    # How players veinmine:
    #   shift   - anyone veinmines while sneaking
    #   enchant - only a tool carrying the Veinminer enchant does
    #   both    - either one
    mode: shift
    max-vein-size: 64
    # Only veinmine with a tool that actually drops the ore.
    require-correct-tool: true
    hunger:
      # Whether the extra blocks cost hunger.
      enabled: true
      exhaustion-per-block: 0.05
    durability:
      # What the vein costs the tool:
      #   per-block - one durability point per ore mined
      #   single    - nothing beyond the one point vanilla already charges for the block the player actually hit, as if they had broken a single block
      mode: per-block

    enchant:
      # Chance (%) that an enchanting table adds Veinminer to a tool.
      chance: 25
      # The table option the player picks must cost at least this many levels before Veinminer can roll.
      min-level: 15
      # Whether an enchanted tool must also be sneaking to veinmine. Off means it always does.
      require-sneak: true
      # Items the enchant may land on.
      tools:
        - WOODEN_PICKAXE
        - STONE_PICKAXE
        - IRON_PICKAXE
        - GOLDEN_PICKAXE
        - DIAMOND_PICKAXE
        - NETHERITE_PICKAXE

    blocks:
      - COAL_ORE
      - DEEPSLATE_COAL_ORE
      - IRON_ORE
      - DEEPSLATE_IRON_ORE
      - COPPER_ORE
      - DEEPSLATE_COPPER_ORE
      - GOLD_ORE
      - DEEPSLATE_GOLD_ORE
      - REDSTONE_ORE
      - DEEPSLATE_REDSTONE_ORE
      - LAPIS_ORE
      - DEEPSLATE_LAPIS_ORE
      - EMERALD_ORE
      - DEEPSLATE_EMERALD_ORE
      - DIAMOND_ORE
      - DEEPSLATE_DIAMOND_ORE
      - NETHER_GOLD_ORE
      - NETHER_QUARTZ_ORE
      - ANCIENT_DEBRIS

  treecapitator:
    enabled: false

    # How players fell trees:
    #   shift   - anyone fells while sneaking
    #   enchant - only an axe carrying the Treecapitator enchant does
    #   both    - either one
    mode: shift
    max-tree-size: 128
    # What one break fells:
    #   whole-tree - every connected log, no matter which log was broken
    #   above      - only the broken block and the logs above it
    scope: whole-tree
    animation: true
    # Break the felled tree's leaves instantly instead of letting them decay slowly.
    fast-leaf-decay: true
    # Plant a matching sapling on the grass where the trunk stood.
    replant-sapling: true
    require-leaves: true
    # Only fell when the log was broken with an axe.
    require-axe: true
    hunger:
      # Whether the extra logs cost hunger.
      enabled: true
      exhaustion-per-block: 0.05
    durability:
      # What the tree costs the axe:
      #   per-block - one durability point per log felled
      #   single    - nothing beyond the one point vanilla already charges.
      mode: per-block

    enchant:
      # Chance (%) that an enchanting table adds Treecapitator to an axe.
      chance: 25
      # The table option the player picks must cost at least this many levels before Treecapitator can roll.
      min-level: 15
      # Whether an enchanted axe must also be sneaking to fell. Off means it always does.
      require-sneak: true
      # Items the enchant may land on.
      tools:
        - WOODEN_AXE
        - STONE_AXE
        - IRON_AXE
        - GOLDEN_AXE
        - DIAMOND_AXE
        - NETHERITE_AXE

    # When this list is absent, every log and wood block counts.
    # blocks:
    #   - OAK_LOG

  mobhealth:
    enabled: false

    # Where the health shows while a player looks at a mob:
    #   above-mob  - a floating health bar over the mob.
    #   action-bar - text above the looking player's hotbar.
    display: above-mob
    # How the health is drawn:
    #   hearts  - ten hearts that empty as the mob loses health
    #   numbers - 12.5/20
    #   both    - hearts and numbers
    style: both
    range: 12
    include-players: false
