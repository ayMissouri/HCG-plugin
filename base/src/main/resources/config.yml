tweaks:
  veinminer:
    enabled: false

    # How players veinmine:
    #   shift   - anyone veinmines while sneaking
    #   enchant - only a tool carrying the Veinminer enchant does
    #   both    - either one
    mode: shift
    max-vein-size: 64
    # Only veinmine with a tool that actually drops the ore.
    require-correct-tool: true
    hunger:
      # Whether the extra blocks cost hunger.
      enabled: true
      exhaustion-per-block: 0.05
    durability:
      # What the vein costs the tool:
      #   per-block - one durability point per ore mined
      #   single    - nothing beyond the one point vanilla already charges for the block the player actually hit, as if they had broken a single block
      mode: per-block

    enchant:
      # Chance (%) that an enchanting table adds Veinminer to a tool.
      chance: 25
      # The table option the player picks must cost at least this many levels before Veinminer can roll.
      min-level: 15
      # Whether an enchanted tool must also be sneaking to veinmine. Off means it always does.
      require-sneak: true
      # Items the enchant may land on.
      tools:
        - WOODEN_PICKAXE
        - STONE_PICKAXE
        - IRON_PICKAXE
        - GOLDEN_PICKAXE
        - DIAMOND_PICKAXE
        - NETHERITE_PICKAXE

    blocks:
      - COAL_ORE
      - DEEPSLATE_COAL_ORE
      - IRON_ORE
      - DEEPSLATE_IRON_ORE
      - COPPER_ORE
      - DEEPSLATE_COPPER_ORE
      - GOLD_ORE
      - DEEPSLATE_GOLD_ORE
      - REDSTONE_ORE
      - DEEPSLATE_REDSTONE_ORE
      - LAPIS_ORE
      - DEEPSLATE_LAPIS_ORE
      - EMERALD_ORE
      - DEEPSLATE_EMERALD_ORE
      - DIAMOND_ORE
      - DEEPSLATE_DIAMOND_ORE
      - NETHER_GOLD_ORE
      - NETHER_QUARTZ_ORE
      - ANCIENT_DEBRIS

  treecapitator:
    enabled: false

    # How players fell trees:
    #   shift   - anyone fells while sneaking
    #   enchant - only an axe carrying the Treecapitator enchant does
    #   both    - either one
    mode: shift
    max-tree-size: 128
    # What one break fells:
    #   whole-tree - every connected log, no matter which log was broken
    #   above      - only the broken block and the logs above it
    scope: whole-tree
    animation: true
    # Break the felled tree's leaves instantly instead of letting them decay slowly.
    fast-leaf-decay: true
    # Plant a matching sapling on the grass where the trunk stood.
    replant-sapling: true
    require-leaves: true
    # Only fell when the log was broken with an axe.
    require-axe: true
    hunger:
      # Whether the extra logs cost hunger.
      enabled: true
      exhaustion-per-block: 0.05
    durability:
      # What the tree costs the axe:
      #   per-block - one durability point per log felled
      #   single    - nothing beyond the one point vanilla already charges.
      mode: per-block

    enchant:
      # Chance (%) that an enchanting table adds Treecapitator to an axe.
      chance: 25
      # The table option the player picks must cost at least this many levels before Treecapitator can roll.
      min-level: 15
      # Whether an enchanted axe must also be sneaking to fell. Off means it always does.
      require-sneak: true
      # Items the enchant may land on.
      tools:
        - WOODEN_AXE
        - STONE_AXE
        - IRON_AXE
        - GOLDEN_AXE
        - DIAMOND_AXE
        - NETHERITE_AXE

    # When this list is absent, every log and wood block counts.
    # blocks:
    #   - OAK_LOG

  mobhealth:
    enabled: false

    # Where the health shows while a player looks at a mob:
    #   above-mob  - a floating health bar over the mob.
    #   action-bar - text above the looking player's hotbar.
    display: above-mob
    # How the health is drawn:
    #   hearts  - ten hearts that empty as the mob loses health
    #   numbers - 12.5/20
    #   both    - hearts and numbers
    style: both
    range: 12
    include-players: false

  # XP from a player's kills and mining goes straight to the player instead of dropping orbs.
  xptp:
    enabled: false

    # Repair the player's Mending gear first.
    mending: true
    # Play the orb pickup sound when the XP arrives.
    sound: true
    # Also send XP from mined blocks (ores, spawners) straight to the miner.
    blocks: true
    # Send killed players' XP straight to the killer.
    include-players: false

  farming:
    enabled: false

    # Right-click a grown crop to harvest it and replant it. One seed is kept back to replant, so the yield matches breaking and replanting by hand.
    right-click-harvest: true
    # When a grown crop is broken, replant it from its own drops so the field refills itself.
    replant-on-break: true
    # Harvesting a grown crop grants experience, like mining an ore.
    xp: true
    # How much experience each harvested crop grants.
    xp-amount: 2
    # Only right-click harvest while holding a hoe. false means any item or an empty hand works.
    require-hoe: false
    # A right-click harvest costs a held hoe one durability point per crop.
    hoe-durability: false
    # Right-click harvests every grown crop within this many blocks (0 harvests only the crop clicked).
    radius: 0
    # Play a soft sound when a right-click harvest lands.
    sound: true

    # Spam crouch near your crops and they grow a little, every now and then.
    twerk-grow:
      enabled: false
      radius: 4
      # Chance (%) that each unripe crop in range advances one growth stage per sneak.
      chance: 15
      # Shortest time (ms) between grows for one player.
      cooldown-ms: 350

  # A held Totem of Undying saves you from the void
  voidtotem:
    enabled: false

    # Strength of the levitation that floats you up out of the void (1-10).
    level: 5
    # Use up the totem when it saves you.
    consume: true
    # Play the totem's pop animation and sound when it saves you.
    effect: true
    # How long the rescue levitation lasts.
    max-seconds: 30

  # A little speed boost while you run along paths.
  pathsprint:
    enabled: false

    # Strength of the speed boost while running on a path (1-3).
    speed: 1
    # Only boost while the player is sprinting. false speeds up plain walking on a path too.
    require-sprint: true
    # Show the speed particle trail while the boost is active.
    particles: false
