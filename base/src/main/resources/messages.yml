# - Color/format codes use & (e.g. &a green, &c red, &6 gold, &l bold, &o italic).
# - {placeholders} are filled in by the plugin, keep them where you want the value.
# This file ships with the base plugin. Each addon has its own messages.yml for its feature.

general:
  only-players: "&cOnly players can use this command."
  player-not-online: "&cPlayer '{player}' is not online."
  not-a-number: "&c'{input}' is not a number."
