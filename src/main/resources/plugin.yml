name: HCGplugin
version: '${project.version}'
main: dev.amissouri.hcg.HCGPlugin
api-version: '1.21'
description: A plugin with a broad range of features and commands.
author: amissouri

commands:
  hcg:
    description: HCGplugin help menu.
    usage: /<command> help [category] [page]
    permission: hcg.help
  healthdecay:
    description: Control the health decay game mode.
    usage: |
      /<command> on|off|status|restore
      /<command> interval <seconds>
      /<command> amount <hearts>
    aliases: [hdecay, hd]
    permission: hcg.healthdecay
  randomdrops:
    description: Control the random block drops game mode.
    usage: /<command> [on|off|status]
    aliases: [rdrops, rd]
    permission: hcg.randomdrops
  lavaraise:
    description: Control the daily rising lava event.
    usage: /<command> [on|off|status|start|end|duration|maxy|water|cancel]
    aliases: [lr]
    permission: hcg.lavaraise
  volcano:
    description: Set a volcano center and trigger eruptions, manually or on a daily schedule.
    usage: /<command> [setcenter|erupt|stop|schedule|duration|status]
    permission: hcg.volcano
  hungergames:
    description: Hunger Games match control, spawn scattering and a staged shrinking world border.
    usage: |
      /<command> addspawn|delspawn|spawns|clearspawns|scatter
      /<command> setcenter|start|stop|status
      /<command> countdown|startsize|expandsize|finalsize|expandtime|stages|stagetime|shrinktime <value>
    aliases: [hg]
    permission: hcg.hungergames
  flyspeed:
    description: Set your fly speed (1-10, default 1).
    usage: /<command> <1-10>
    permission: hcg.flyspeed
  fly:
    description: Toggle flight in any gamemode.
    usage: /<command>
    permission: hcg.fly
  gmc:
    description: Switch to creative mode.
    usage: /<command> [player]
    permission: hcg.gamemode
  gms:
    description: Switch to survival mode.
    usage: /<command> [player]
    permission: hcg.gamemode
  gmsp:
    description: Switch to spectator mode.
    usage: /<command> [player]
    permission: hcg.gamemode
  gma:
    description: Switch to adventure mode.
    usage: /<command> [player]
    permission: hcg.gamemode
  tpall:
    description: Teleport all other players to you, your crosshair target, or a player.
    usage: /<command> <here|looking|player>
    permission: hcg.tpall
  freeze:
    description: Freeze or unfreeze a player, or all players.
    usage: /<command> <all|player>
    permission: hcg.freeze
  invsee:
    description: Open and edit another player's inventory.
    usage: /<command> <player>
    permission: hcg.invsee
  heal:
    description: Heal yourself, a player, or everyone.
    usage: /<command> [player|all]
    permission: hcg.heal
  feed:
    description: Restore hunger for yourself, a player, or everyone.
    usage: /<command> [player|all]
    permission: hcg.feed
  anvil:
    description: Open a virtual anvil.
    usage: /<command>
    permission: hcg.anvil
  craft:
    description: Open a virtual crafting table.
    usage: /<command>
    permission: hcg.craft
  enderchest:
    description: Open your (or another player's) ender chest.
    usage: /<command> [player]
    aliases: [ec]
    permission: hcg.enderchest
  burn:
    description: Set a player on fire.
    usage: /<command> <player> [seconds]
    permission: hcg.burn
  enchant:
    description: Enchant your held item beyond vanilla limits.
    usage: /<command> <enchantment> <level>
    permission: hcg.enchant
  god:
    description: Toggle invulnerability.
    usage: /<command> [player]
    permission: hcg.god
  hat:
    description: Wear your held item as a hat.
    usage: /<command>
    permission: hcg.hat
  lore:
    description: Set the lore of your held item (& colors, | for new lines).
    usage: /<command> <text|reset>
    permission: hcg.lore
  name:
    description: Rename your held item (& colors supported).
    usage: /<command> <text|reset>
    permission: hcg.name
  nickname:
    description: Set a player's display name (& colors supported).
    usage: /<command> [player] <text|reset>
    aliases: [nick]
    permission: hcg.nickname
  lightning:
    description: Strike lightning where you're looking.
    usage: /<command>
    permission: hcg.lightning
  remove:
    description: Remove ground items, entities, or mobs.
    usage: /<command> <items|entities|mobs> [hostile|neutral]
    permission: hcg.remove
  spawner:
    description: Change the mob type of the spawner you're looking at.
    usage: /<command> <mob>
    permission: hcg.spawner
  spawnmob:
    description: Spawn mobs at your location.
    usage: /<command> <mob> [amount]
    permission: hcg.spawnmob
  sudo:
    description: Make a player say something or run a command.
    usage: /<command> <player> <message or /command>
    permission: hcg.sudo
  vanish:
    description: Toggle invisibility to other players.
    usage: /<command> [player]
    aliases: [v]
    permission: hcg.vanish
  graves:
    description: Toggle death graves that store items and XP, force remove the grave you're looking at.
    usage: /<command> [on|off|status|remove]
    permission: hcg.graves
  healthshare:
    description: Split all players into teams that share a single health pool.
    usage: /<command> <players-per-team> | stop | status | teams
    aliases: [hshare]
    permission: hcg.healthshare
  npc:
    description: Create and manage player NPCs with skins, holograms, and click actions.
    usage: |
      /<command> create|remove|info|teleport <name>  -  /<command> list
      /<command> skin <name> <player|url|reset>
      /<command> displayname <name> <text|none>
      /<command> equipment <name> <set|clear|list> [slot]
      /<command> glowing <name> <color|off>  -  /<command> collidable|showintab <name> <on|off>
      /<command> movehere <name>  -  /<command> rotate <name> <yaw> <pitch>
      /<command> turntoplayer <name> <on|off> [distance]  -  /<command> cooldown <name> <seconds>
      /<command> action <name> <trigger> <add|remove|list|clear> ...
    permission: hcg.npc

permissions:
  hcg.*:
    description: All HCGplugin commands.
    default: op
    children:
      hcg.help: true
      hcg.healthdecay: true
      hcg.randomdrops: true
      hcg.lavaraise: true
      hcg.volcano: true
      hcg.hungergames: true
      hcg.flyspeed: true
      hcg.fly: true
      hcg.gamemode: true
      hcg.tpall: true
      hcg.freeze: true
      hcg.invsee: true
      hcg.heal: true
      hcg.feed: true
      hcg.anvil: true
      hcg.craft: true
      hcg.enderchest: true
      hcg.burn: true
      hcg.enchant: true
      hcg.god: true
      hcg.hat: true
      hcg.lore: true
      hcg.name: true
      hcg.nickname: true
      hcg.lightning: true
      hcg.remove: true
      hcg.spawner: true
      hcg.spawnmob: true
      hcg.sudo: true
      hcg.vanish: true
      hcg.npc: true
      hcg.graves: true
      hcg.healthshare: true
  hcg.help:
    default: op
  hcg.healthdecay:
    default: op
  hcg.randomdrops:
    default: op
  hcg.lavaraise:
    default: op
  hcg.volcano:
    default: op
  hcg.hungergames:
    default: op
  hcg.flyspeed:
    default: op
  hcg.fly:
    default: op
  hcg.gamemode:
    default: op
  hcg.tpall:
    default: op
  hcg.freeze:
    default: op
  hcg.invsee:
    default: op
  hcg.heal:
    default: op
  hcg.feed:
    default: op
  hcg.anvil:
    default: op
  hcg.craft:
    default: op
  hcg.enderchest:
    default: op
  hcg.burn:
    default: op
  hcg.enchant:
    default: op
  hcg.god:
    default: op
  hcg.hat:
    default: op
  hcg.lore:
    default: op
  hcg.name:
    default: op
  hcg.nickname:
    default: op
  hcg.lightning:
    default: op
  hcg.remove:
    default: op
  hcg.spawner:
    default: op
  hcg.spawnmob:
    default: op
  hcg.sudo:
    default: op
